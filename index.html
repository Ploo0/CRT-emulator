<!doctype html>
<html>
	
		<meta charset="utf-8">
		<link rel="stylesheet" href="css/styles.css"/>
		<link rel="stylesheet" type="text/css" href="css/topcoat-desktop-dark.css"/>
		<script src="js/libs/CSInterface.js" defer></script>
		<script src="js/main.js" defer></script>
			<title>Text Mate</title>
			
	<script>
		
		var isNS = (navigator.appName == "Netscape") ? 1 : 0;
		
		if(navigator.appName == "Netscape") document.captureEvents(Event.MOUSEDOWN||Event.MOUSEUP);

		function mischandler(){
		return false;
		}

		function mousehandler(e){
		var myevent = (isNS) ? e : event;
		var eventbutton = (isNS) ? myevent.which : myevent.button;
		if((eventbutton==2)||(eventbutton==3)) return false;
		}
		document.oncontextmenu = mischandler;
		document.onmousedown = mousehandler;
		document.onmouseup = mousehandler;
		
	</script>

	<div id="loadingScreen">

	</div>

	<body style="overflow-y:hidden">
		<div class="container">
			<head>	
				<div class="logoContainer">
					<img src="LOGO.png" class="imageLogo" id="logo">
				</div>

				<div class="strip">

				</div>
			</head>

				</div>
			</div>
			<div class="line" ></div>

				<label class="img">

				</label>
				  
				<label class="img">

				</label>
				  
				<label class="img">
					<input type="radio" name="effect"> 
					<div class="checkmark" id="10"><span>Style 10</span></div>

			<br>
			<div class="text--center" >
